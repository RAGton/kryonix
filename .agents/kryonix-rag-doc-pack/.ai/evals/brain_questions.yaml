questions:
  - id: glacier-rebuild-safe
    query: "Como faço rebuild seguro do Glacier?"
    expected_strategy: "cag"
    must_include:
      - "nh os build .#glacier"
      - "nh os test .#glacier"
      - "nh os switch .#glacier"
    forbidden:
      - "ISO live"
      - "glacier-live"
      - "disko"
      - "mkfs"
      - "./run.sh"
      - "climate change"
      - "ice sheet"
      - "glacial melt"

  - id: glacier-role
    query: "Como funciona o Glacier no Kryonix?"
    expected_strategy: "cag"
    must_include:
      - "host"
      - "Kryonix"
      - "Ollama"
    forbidden:
      - "climate change"
      - "ice cores"
      - "polar regions"

  - id: vault-old-bluetooth
    query: "Procure no vault uma nota antiga sobre Bluetooth"
    expected_strategy: "rag_or_hybrid"
    must_include: []
    forbidden:
      - "CAG puro"

  - id: glacier-disko-specific
    query: "Como particionar o disco do Glacier com disko?"
    expected_strategy: "cag_or_hybrid"
    must_include:
      - "disko"
    forbidden:
      - "climate change"
