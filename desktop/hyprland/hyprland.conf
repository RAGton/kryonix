# =============================================================================
# Hyprland config (base)
#
# Este arquivo é referenciado por `desktop/hyprland/user.nix` via:
#   xdg.configFile."hypr/hyprland.conf".source = ./hyprland.conf;
#
# Objetivo:
# - Fornecer um config mínimo e estável para avaliação/build.
# - Permitir que rices (ex.: DMS) adicionem/override via `extraConfig`/includes.
#
# Nota:
# - Ajuste conforme necessário para seu workflow.
# =============================================================================

# Monitor (genérico)
monitor=,preferred,auto,1

# Exec / autostart (vazio por padrão)
# exec-once = ...

# Input básico
input {
  kb_layout = br
}

# Geral
general {
  gaps_in = 5
  gaps_out = 10
  border_size = 2
}

# Decoração
decoration {
  rounding = 10
}

# Animações (leve)
animations {
  enabled = true
}

# Binds mínimos
# Usa SUPER (Meta) como modificador principal.
$mainMod = SUPER
$mod = $mainMod
#bind = $mainMod, RETURN, exec, warp-terminal
bind = $mainMod, Q, killactive,
#bind = $mainMod, M, exit,

# Fallback: se TERMINAL não estiver definido, você pode setar em env/exec

# =============================================================================
# DMS (DankMaterialShell)
#
# O DMS gera snippets Hyprland em: ~/.config/hypr/dms/
# Para evitar que o DMS tente editar este arquivo (geralmente um symlink
# gerenciado pelo Home Manager), nós incluímos os snippets diretamente.
# =============================================================================
source = ~/.config/hypr/dms/layout.conf
source = ~/.config/hypr/dms/colors.conf
source = ~/.config/hypr/dms/binds.conf
source = ~/.config/hypr/dms/windowrules.conf

# -----------------------------
# Custom binds (workspaces, mover janelas, launcher, clipboard, codex)
# -----------------------------

# Alternar workspaces com $mod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover janela ativa para workspace com $mod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Mover foco com $mod + hjkl
bind = $mainMod, l, movefocus, l
bind = $mainMod, h, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Redimensionar janela com $mod + SHIFT + setas
bind = $mainMod SHIFT, left, resizeactive, -50 0
bind = $mainMod SHIFT, right, resizeactive, 50 0
bind = $mainMod SHIFT, up, resizeactive, 0 -50
bind = $mainMod SHIFT, down, resizeactive, 0 50

# Mover / redimensionar com mouse (arrastar)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Launcher (wofi) - mostrar apps
bind = $mainMod, A, exec, wofi --show drun

# Área de transferência (cliphist + wofi + wl-copy)
bind = ALT SHIFT, V, exec, cliphist list | wofi --show dmenu | cliphist decode | wl-copy

# Atalho para abrir o 'codex' na mesma configuração de terminal (alacritty)
# Ajuste o terminal se usar outro (ex.: warp-terminal, foot, kitty)
bind = $mainMod SHIFT, C, exec, warp-terminal -e codex

